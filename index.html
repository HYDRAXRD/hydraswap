<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydra Swap</title>
    <meta name="description" content="Trade tokens instantly on the Radix network" />
    <meta name="author" content="Hydra Community" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <meta property="og:title" content="Hydra Swap" />
    <meta property="og:description" content="Trade tokens instantly on the Radix network" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Disable right-click and dev tools shortcuts
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F12') e.preventDefault();
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) e.preventDefault();
        if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) e.preventDefault();
        if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) e.preventDefault();
      });
    </script>
  </body>
</html>
